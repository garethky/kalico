# Test config for the Bondtech INDX toolboard
[mcu]
serial: /dev/klipper_main

[mcu indxmcu]
serial: /dev/klipper_indx

[printer]
kinematics: none
max_velocity: 300
max_accel: 3000

[indx]
mcu: indxmcu

[fan]
pin: indxmcu:part_cooling
tachometer_pin: indxmcu:part_cooling_tacho

[extruder]
step_pin: indxmcu:motor_step
dir_pin: indxmcu:motor_dir
enable_pin: !indxmcu:motor_enable
microsteps: 32
rotation_distance: 5.7
nozzle_diameter: 0.4
filament_diameter: 1.75
heater_pin: indx:heater
sensor_type: indx
control: watermark
min_temp: 0
max_temp: 300
